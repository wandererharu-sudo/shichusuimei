                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    <span style={{fontSize:18,fontWeight:700,color:EC[ryunenData.stemEl]?.tx}}>{ryunenData.stem}</span>
                    <span style={{fontSize:18,fontWeight:700,color:EC[ryunenData.branchEl]?.tx}}>{ryunenData.branch}</span>
                    <span style={{fontSize:10,color:"#8a7a60"}}>年</span>
                  </div>
                )}
                {/* 五行バランスミニ表示 */}
                {ryunenData && (
                  <div style={{display:"flex",gap:4,alignItems:"center",marginLeft:8}}>
                    {["木","火","土","金","水"].map(el=>{
                      const cnt = (result.ec[el]||0) + (yearEc[el]||0);
                      const c = EC[el];
                      return cnt>0 ? (
                        <span key={el} style={{fontSize:10,padding:"1px 5px",borderRadius:4,background:c.bg,color:c.tx,border:`1px solid ${c.bd}44`,fontWeight:700}}>{el}{cnt}</span>
                      ):null;
                    })}
                  </div>
                )}
                <div style={{marginLeft:"auto",background:rCol,color:"#fff",padding:"4px 12px",borderRadius:16,fontSize:12,fontWeight:700}}>{yr.rating}</div>
              </div>
              <div style={{padding:"12px 16px"}}>
                <div style={{fontSize:13,fontWeight:700,color:rCol,marginBottom:10}}>{yr.summary}</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8,marginBottom:10}}>
                  {[["💼 仕事・キャリア",yr.work],["💰 金運・財運",yr.money],["💫 対人・恋愛",yr.relation],["🌿 健康",yr.health]].map(([label,text],j)=>(
                    <div key={j} style={{background:"#ffffff88",borderRadius:6,padding:"8px 10px"}}>
                      <div style={{fontSize:10,color:"#7a5a2a",marginBottom:4,fontWeight:700}}>{label}</div>
                      <div style={{fontSize:11,lineHeight:1.7,color:"#4a3828"}}>{text}</div>
                    </div>
                  ))}
                </div>
                <div style={{background:"#ffffff66",borderRadius:6,padding:"8px 12px",borderLeft:`3px solid ${rCol}`}}>
                  <div style={{fontSize:10,color:rCol,marginBottom:3,fontWeight:700}}>✦ アドバイス</div>
                  <div style={{fontSize:11,lineHeight:1.7,color:"#4a3828"}}>{yr.advice}</div>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      {fortune && (
        <div style={{textAlign:"center",marginTop:16}}>
          <button onClick={generateFortune} style={{padding:"8px 20px",borderRadius:8,background:"transparent",border:"1px solid #c4a070",color:"#8a6a3a",cursor:"pointer",fontSize:11}}>🔄 再鑑定する</button>
        </div>
      )}
    </div>
  );
}

// ─── 年齢指定運勢セクション ────────────────────────────────────
function AgeFortuneSection({result, globalApiKey, setGlobalApiKey}) {
  const [inputAge, setInputAge] = useState("");
  const [mode, setMode] = useState("auto");
  const [fortune, setFortune] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [errorDetail, setErrorDetail] = useState(null);
  const apiKey = globalApiKey;
  const setApiKey = setGlobalApiKey;
  const [targetYears, setTargetYears] = useState(null); // 前後3年 計7年
  const [futureYears5, setFutureYears5] = useState(null); // 指定年齢以降5年
  const [showFuture5, setShowFuture5] = useState(false);
  const [visibleYears, setVisibleYears] = useState(null);
  const [fortune5, setFortune5] = useState(null);
  const [loading5, setLoading5] = useState(false);
  const [error5, setError5] = useState(null);
  const [spicyMode, setSpicyMode] = useState(false);

  const birthYear = Number(result.bd.split("-")[0]);
  const RATING_COLOR = {"◎大吉":"#e8920a","○吉":"#4a9a4a","△普通":"#7a7a3a","▲注意":"#9a6a1a","✕凶":"#9a2a2a"};
  const RATING_BG = {"◎大吉":"#fff3e0","○吉":"#e8f5e8","△普通":"#f5f5e8","▲注意":"#f5ece0","✕凶":"#f5e0e0"};

  const handleSearch = () => {
    const age = parseInt(inputAge);
    if (!age || age < 1 || age > 120) return;
    const centerYear = birthYear + age - 1;
    const years7 = calcRyunen(centerYear - 3, 7, result.pillars.day.stemIdx);
    const years5 = calcRyunen(centerYear, 5, result.pillars.day.stemIdx);
    setTargetYears(years7);
    setFutureYears5(years5);
    setVisibleYears(new Set(years7.map(r=>r.year)));
    setFortune(null); setFortune5(null);
    setError(null); setError5(null);
    setShowFuture5(false);
  };

  const toggleYear = (y) => setVisibleYears(prev=>{const n=new Set(prev); n.has(y)?n.delete(y):n.add(y); return n;});

  // 指定年齢の五行バランス（命式 + その年の流年）
  const centerYearData = targetYears?.[3];
  const centerEc = centerYearData ? Object.assign({}, result.ec) : null;
  if(centerYearData && centerEc){
    centerEc[centerYearData.stemEl] = (centerEc[centerYearData.stemEl]||0)+1;
    centerEc[centerYearData.branchEl] = (centerEc[centerYearData.branchEl]||0)+1;
  }

  const buildPrompt = (years, label) => {
    const age = parseInt(inputAge);
    const centerYear = birthYear + age - 1;
    const dayStem = result.pillars.day.stem;
    const youjin = result.youjin;
    const curDaiun = result.daiun.list.find((d,i,arr)=>d.startYear<=centerYear&&(!arr[i+1]||arr[i+1].startYear>centerYear));
    const yearsList = years.map(r=>r.year+"年("+r.stem+r.branch+"・"+(r.tsuhen||"—")+")").join(", ");
    const daiunStr2 = curDaiun ? curDaiun.stem+curDaiun.branch+"("+curDaiun.startYear+"年〜)" : "不明";
    const baseInfo = label+"の運勢を鑑定。\n命式: 日干"+dayStem+"、"+(youjin?.bodyStr||"")+"、用神:"+(youjin?.youjinEl||"")+"、喜神:"+(youjin?.kijiinEl||"")+"\n大運:"+daiunStr2+"\n流年: "+yearsList;
    const jsonSchema = '\nJSONのみ出力(前後に何も付けない):\n{"overview":"総括100字","years":[{"year":西暦数値,"rating":"◎大吉か○吉か△普通か▲注意か✕凶","summary":"80字","work":"30字","money":"30字","relation":"30字","health":"30字","advice":"30字"}]}';
    if(spicyMode) {
      return "あなたは歯に衣着せぬ辛口の四柱推命師です。お世辞や慰めは一切不要。命式が示す現実をそのまま伝え、厳しい運気の年は「厳しい」と明言し、本人が直視すべき課題を率直に指摘してください。ただし根拠のない断言は避け、命式データに基づいた具体的な指摘をすること。\n\n"+baseInfo+"\n\n【出力ルール】\n- 総括は100字以内、辛口・直球で\n- 各年のsummaryは80字以内、現実を直視した表現で\n- adviceは「〜すべき」「〜しないと損をする」など歯切れよく"+jsonSchema;
    } else {
      return "四柱推命専門家として"+baseInfo+"\n各年80文字以内で簡潔に。"+jsonSchema;
    }
  };

  const generateAI = async (years, label, setF, setL, setE) => {
    setL(true); setE(null);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4000,messages:[{role:"user",content:buildPrompt(years,label)}]})
      });
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if(data.error) throw new Error(data.error.message);
      const text = data.content?.map(c=>c.text||"").join("")||"";
      const m = text.replace(new RegExp(String.fromCharCode(96,96,96)+'json[\\s\\S]*?'+String.fromCharCode(96,96,96),'g'),x=>x.slice(7,-3)).replace(new RegExp(String.fromCharCode(96,96,96),'g'),"").trim().match(/\{[\s\S]*\}/);
      if(!m) throw new Error("JSONが取得できませんでした");
      setF(JSON.parse(m[0]));
    } catch(e){ setE(e.message); }
    setL(false);
  };

  const renderFortune = (fort, years) => (
    <div style={{display:"flex",flexDirection:"column",gap:10,marginTop:10}}>
      {fort.overview&&<div style={{background:"linear-gradient(135deg,#fdf5e8,#f5ede0)",border:"1px solid #d4b896",borderRadius:8,padding:"10px 14px",fontSize:12,lineHeight:1.8,color:"#4a3828"}}><span style={{fontSize:10,color:"#8a6a3a",fontWeight:700,marginRight:8}}>◈ 総括</span>{fort.overview}</div>}
      {fort.years?.map((yr,i)=>{
        const rCol=RATING_COLOR[yr.rating]||"#7a6a55", rBg=RATING_BG[yr.rating]||"#fdf8f2";
        const rd=years.find(r=>r.year===yr.year);
        const isCenter = rd && years[3]?.year===yr.year;
        return(
          <div key={i} style={{background:rBg,border:`${isCenter?2:1}px solid ${isCenter?rCol:rCol+"44"}`,borderRadius:10,overflow:"hidden"}}>
            <div style={{background:`${rCol}18`,padding:"8px 14px",display:"flex",alignItems:"center",gap:10,borderBottom:`1px solid ${rCol}22`,flexWrap:"wrap"}}>
              <div style={{fontSize:18,fontWeight:900,color:rCol}}>{yr.year}年</div>
              {rd&&<span style={{fontSize:13,color:EC[rd.stemEl]?.tx,fontWeight:700}}>{rd.stem}</span>}
              {rd&&<span style={{fontSize:13,color:EC[rd.branchEl]?.tx,fontWeight:700}}>{rd.branch}</span>}
              {isCenter&&<span style={{fontSize:10,background:"#e8920a",color:"#fff",padding:"2px 7px",borderRadius:10}}>指定年齢</span>}
              {/* 五行ミニバッジ */}
              {rd&&<div style={{display:"flex",gap:3}}>
                {["木","火","土","金","水"].map(el=>{
                  const cnt=(result.ec[el]||0)+(rd.stemEl===el?1:0)+(rd.branchEl===el?1:0);
                  const c=EC[el];
                  return cnt>0?<span key={el} style={{fontSize:9,padding:"1px 4px",borderRadius:3,background:c.bg,color:c.tx,border:`1px solid ${c.bd}44`,fontWeight:700}}>{el}{cnt}</span>:null;
                })}
              </div>}
              <div style={{marginLeft:"auto",background:rCol,color:"#fff",padding:"3px 10px",borderRadius:14,fontSize:11,fontWeight:700}}>{yr.rating}</div>
            </div>
            <div style={{padding:"10px 14px"}}>
              <div style={{fontSize:12,fontWeight:700,color:rCol,marginBottom:6}}>{yr.summary}</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:6,marginBottom:6}}>
                {[["💼 仕事",yr.work],["💰 金運",yr.money],["💫 対人",yr.relation],["🌿 健康",yr.health]].map(([l,t],j)=>(
                  <div key={j} style={{background:"#ffffff88",borderRadius:5,padding:"5px 8px"}}>
                    <div style={{fontSize:9,color:"#7a5a2a",fontWeight:700,marginBottom:2}}>{l}</div>
                    <div style={{fontSize:10,lineHeight:1.6,color:"#4a3828"}}>{t}</div>
                  </div>
                ))}
              </div>
              <div style={{background:"#ffffff66",borderRadius:5,padding:"6px 10px",borderLeft:`3px solid ${rCol}`}}>
                <div style={{fontSize:9,color:rCol,fontWeight:700,marginBottom:1}}>✦ アドバイス</div>
                <div style={{fontSize:10,lineHeight:1.6,color:"#4a3828"}}>{yr.advice}</div>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );

  return (
    <div>
      {/* 入力エリア */}
      <div style={{background:"#fdf8f2",border:"1px solid #d4b896",borderRadius:10,padding:"16px",marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <label style={{fontSize:13,color:"#5a3a1a",fontWeight:700}}>数え年で入力：</label>
            <input type="number" min="1" max="120" value={inputAge} onChange={e=>setInputAge(e.target.value)} placeholder="例: 30"
              style={{width:80,padding:"6px 10px",borderRadius:8,border:"1px solid #c4a070",fontSize:14,textAlign:"center"}}/>
            <span style={{fontSize:13,color:"#5a3a1a"}}>歳</span>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            <button onClick={()=>{setMode("auto");handleSearch();}} disabled={!inputAge}
              style={{padding:"7px 18px",borderRadius:8,border:"1px solid #c4a070",background:mode==="auto"?"#e8a030":"#fdf5e8",color:mode==="auto"?"#fff":"#8a6a3a",cursor:inputAge?"pointer":"not-allowed",fontSize:12,fontWeight:700}}>自動計算</button>
            <button onClick={()=>{setMode("ai");handleSearch();}} disabled={!inputAge}
              style={{padding:"7px 18px",borderRadius:8,border:"1px solid #c4a070",background:mode==="ai"?"#e8a030":"#fdf5e8",color:mode==="ai"?"#fff":"#8a6a3a",cursor:inputAge?"pointer":"not-allowed",fontSize:12,fontWeight:700}}>AI鑑定</button>

          </div>
        </div>
        <div style={{fontSize:10,color:"#9a8a70",marginTop:6}}>※ 入力した年齢を中心に前後3年ずつ計7年分を表示します</div>
      </div>

      {targetYears && (
        <div>
          {/* 指定年齢の五行バランス */}
          {centerYearData && centerEc && (
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,padding:"10px 16px",background:"#fdf5e8",borderRadius:10,border:"1px solid #e0c890",flexWrap:"wrap"}}>
              <div style={{fontSize:12,color:"#5a3a1a",fontWeight:700}}>{parseInt(inputAge)}歳（{centerYearData.year}年）の五行バランス：</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {["木","火","土","金","水"].map(el=>{
                  const cnt = centerEc[el]||0;
                  const c = EC[el];
                  return cnt>0?(
                    <div key={el} style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"4px 10px",borderRadius:8,background:c.bg,border:`1px solid ${c.bd}`,minWidth:36}}>
                      <span style={{fontSize:16,fontWeight:700,color:c.tx}}>{el}</span>
                      <span style={{fontSize:10,color:c.tx,opacity:0.8}}>{cnt}</span>
                    </div>
                  ):null;
                })}
              </div>
              <div style={{fontSize:10,color:"#9a8a70",marginLeft:"auto"}}>命式＋流年（{centerYearData.stem}{centerYearData.branch}年）</div>
            </div>
          )}

          {/* 年ON/OFFチェックボックス */}
          {visibleYears && (
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12,padding:"8px 12px",background:"#fdf5e8",borderRadius:8,border:"1px solid #e0c890",alignItems:"center"}}>
              <span style={{fontSize:11,color:"#7a5a2a",fontWeight:700}}>表示する年：</span>
              {targetYears.map((r,i)=>{
                const on=visibleYears.has(r.year), sc=EC[r.stemEl], isC=i===3;
                return(
                  <label key={r.year} style={{display:"flex",alignItems:"center",gap:3,cursor:"pointer",padding:"3px 8px",borderRadius:14,border:`1px solid ${on?sc?.bd+"88":"#ccc"}`,background:on?(isC?"#e8d4b8":sc?.bg+"88"):"#f5f5f5",fontSize:11,userSelect:"none"}}>
                    <input type="checkbox" checked={on} onChange={()=>toggleYear(r.year)} style={{accentColor:sc?.bd,width:12,height:12}}/>
                    <span style={{color:on?sc?.tx:"#aaa",fontWeight:isC?700:400}}>{r.year}年</span>
                    {isC&&<span style={{fontSize:9,color:"#e8920a"}}>●</span>}
                  </label>
                );
              })}
            </div>
          )}

          {/* 流年テーブル ＋ 五行バランス（横並び） */}
          <div style={{display:"flex",flexDirection:"row",gap:16,alignItems:"flex-start",marginBottom:16,flexWrap:"wrap"}}>
            <div style={{overflowX:"auto",flexShrink:0}}>
            <table style={{borderCollapse:"collapse",fontSize:12}}>
              <tbody>
                {[
                  ["数え年", targetYears.map((r,i)=>({val:`${r.year-birthYear+1}歳`,isC:i===3}))],
                  ["西暦",   targetYears.map((r,i)=>({val:`${r.year}`,isC:i===3}))],
                ].map(([label,cells])=>(
                  <tr key={label}>
                    <td style={{border:"1px solid #c8b89a",padding:"4px 8px",background:"#f0e8da",fontSize:11,color:"#7a6a55",whiteSpace:"nowrap"}}>{label}</td>
                    {cells.map((c,i)=><td key={i} style={{border:"1px solid #c8b89a",padding:"4px 6px",textAlign:"center",fontSize:11,background:c.isC?"#e8d4b8":"#fdf8f2",fontWeight:c.isC?700:400,color:c.isC?"#5a3010":"#8a7a60",minWidth:52}}>{c.val}</td>)}
                  </tr>
                ))}
                <tr>
                  <td style={{border:"1px solid #c8b89a",padding:"4px 8px",background:"#f0e8da",fontSize:11,color:"#7a6a55"}}>天干</td>
                  {targetYears.map((r,i)=>{const sc=EC[r.stemEl],isC=i===3; return <td key={i} style={{border:"1px solid #c8b89a",padding:"4px 6px",textAlign:"center",background:isC?"#e8d4b8":"#fdf8f2"}}><span style={{fontSize:18,fontWeight:700,color:sc?.tx}}>{r.stem}</span><div style={{fontSize:9,color:sc?.tx,opacity:0.7}}>{r.stemEl}</div></td>;})}
                </tr>
                <tr>
                  <td style={{border:"1px solid #c8b89a",padding:"4px 8px",background:"#f0e8da",fontSize:11,color:"#7a6a55"}}>通変星</td>
                  {targetYears.map((r,i)=>{const isC=i===3; return <td key={i} style={{border:"1px solid #c8b89a",padding:"4px 6px",textAlign:"center",fontSize:11,background:isC?"#e8d4b8":"#fdf8f2",color:isC?"#5a3010":"#555"}}>{r.tsuhen||"—"}</td>;})}
                </tr>
                <tr>
                  <td style={{border:"1px solid #c8b89a",padding:"4px 8px",background:"#f0e8da",fontSize:11,color:"#7a6a55"}}>地支</td>
                  {targetYears.map((r,i)=>{const bc=EC[r.branchEl],isC=i===3; return <td key={i} style={{border:"1px solid #c8b89a",padding:"4px 6px",textAlign:"center",background:isC?"#e8d4b8":"#fdf8f2"}}><span style={{fontSize:18,fontWeight:700,color:bc?.tx}}>{r.branch}</span><div style={{fontSize:9,color:bc?.tx,opacity:0.7}}>{r.branchEl}</div></td>;})}
                </tr>
                <tr>
                  <td style={{border:"1px solid #c8b89a",padding:"4px 8px",background:"#f0e8da",fontSize:11,color:"#7a6a55"}}>十二運</td>
                  {targetYears.map((r,i)=>{const isC=i===3,ju=getJunishi(result.pillars.day.stemIdx,r.branchIdx); return <td key={i} style={{border:"1px solid #c8b89a",padding:"4px 6px",textAlign:"center",fontSize:11,background:isC?"#e8d4b8":"#fdf8f2",color:isC?"#5a3010":"#555"}}>{ju}</td>;})}
                </tr>
              </tbody>
            </table>
            </div>
            {/* 五行バランス（命式＋指定年の流年） */}
            {centerYearData && centerEc && (()=>{
              // stemEc/branchEcも指定年の流年を加算して作成
              const sStemEc = Object.assign({},result.stemEc||{});
              const sBranchEc = Object.assign({},result.branchEc||{});
              sStemEc[centerYearData.stemEl] = (sStemEc[centerYearData.stemEl]||0)+1;
              sBranchEc[centerYearData.branchEl] = (sBranchEc[centerYearData.branchEl]||0)+1;
              return (
                <div style={{flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center"}}>
                  <div style={{fontSize:11,color:"#5a3a1a",marginBottom:2,letterSpacing:1,alignSelf:"flex-start"}}>
                    ▌ 五行バランス（{parseInt(inputAge)}歳・{centerYearData.year}年）
                  </div>
                  <GogyouCircle ec={centerEc} stemEc={sStemEc} branchEc={sBranchEc} extraEc={{木:0,火:0,土:0,金:0,水:0}} dayEl={result.pillars.day.stemEl}/>
                </div>
              );
            })()}
          </div>

          {/* AI鑑定（前後7年） */}
          {mode==="ai" && !fortune && !loading && (
            <div style={{background:"#fdf8f2",border:"1px dashed #c4a070",borderRadius:10,padding:"14px",textAlign:"center",marginBottom:12}}>
              {!apiKey.trim()&&<div style={{marginBottom:10,textAlign:"left"}}>
                <div style={{fontSize:11,color:"#7a6a55",marginBottom:4}}>Anthropic APIキー</div>
                <input type="text" value={apiKey} onChange={e=>{setApiKey(e.target.value);try{localStorage.setItem("shichusuimei_apikey",e.target.value);}catch{}}} placeholder="sk-ant-..."
                  style={{width:"100%",padding:"8px 12px",borderRadius:8,border:"1px solid #c4a070",fontSize:12,background:"#fdf5e8",boxSizing:"border-box"}}/>
              </div>}
              <button onClick={()=>generateAI(targetYears,`${inputAge}歳前後7年間`,setFortune,setLoading,setError)} disabled={!apiKey.trim()}
                style={{background:apiKey.trim()?"linear-gradient(135deg,#c88a2a,#e8a030)":"#ccc",border:"none",borderRadius:24,padding:"10px 28px",color:"#fff",fontSize:13,fontWeight:700,cursor:apiKey.trim()?"pointer":"not-allowed",letterSpacing:1}}>
                ✦ 前後7年のAI鑑定 ✦
              </button>
            </div>
          )}
          {mode==="ai" && loading && <div style={{textAlign:"center",padding:"20px",fontSize:13,color:"#7a5a2a"}}>⏳ 鑑定中...</div>}
          {mode==="ai" && error && <div style={{padding:"10px",background:"#fdf0f0",borderRadius:8,fontSize:11,color:"#904040"}}>{error}<button onClick={()=>generateAI(targetYears,`${inputAge}歳前後7年間`,setFortune,setLoading,setError)} style={{marginLeft:8,padding:"3px 10px",borderRadius:5,background:"#c04040",border:"none",color:"#fff",cursor:"pointer",fontSize:10}}>再試行</button></div>}
          {mode==="ai" && fortune && (
            <div>

function QuickAskPanel({result, globalApiKey}) {
  const [question, setQuestion] = useState("");
  const [answer, setAnswer] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  const handleAsk = async () => {
    if(!question.trim()) return;
    if(!globalApiKey.trim()) { setError("APIキーを設定してください"); return; }
    setLoading(true); setAnswer(null); setError(null);
    try {
      const pillars = result.pillars;
      const meishiki = `日干:${pillars.day?.stem}(${pillars.day?.stemEl}) 月支:${pillars.month?.branch} 年柱:${pillars.year?.stem}${pillars.year?.branch} 月柱:${pillars.month?.stem}${pillars.month?.branch} 日柱:${pillars.day?.stem}${pillars.day?.branch} 時柱:${pillars.hour?.stem||""}${pillars.hour?.branch||""} 身${result.youjin?.bodyStrength||""} 用神:${result.youjin?.youjin||""}`;
      const system = `あなたは四柱推命の専門家です。以下の命式を踏まえて質問に端的に答えてください。余計な前置きは不要。300字以内で。
命式：${result.name}様（${result.bd}・${result.gender==="male"?"男性":"女性"}）
${meishiki}`;
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":globalApiKey,"anthropic-version":"2023-06-01"},
        body:JSON.stringify({model:"claude-opus-4-5",max_tokens:600,system,messages:[{role:"user",content:question}]})
      });
      const data = await res.json();
      if(data.error) throw new Error(data.error.message);
      setAnswer(data.content?.[0]?.text||"");
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  };

  return (
    <div style={{margin:"16px 16px 8px",padding:"12px 14px",background:"rgba(253,248,242,0.95)",border:"1px solid #d4b896",borderRadius:10}}>
      <div style={{fontSize:12,color:"#5a3a1a",fontWeight:700,marginBottom:8,letterSpacing:1}}>💬 命式について質問する</div>
      <div style={{display:"flex",gap:8,alignItems:"flex-start"}}>
        <textarea
          value={question}
          onChange={e=>setQuestion(e.target.value)}
          placeholder={`${result.name}様の命式について質問…`}
          rows={2}
          style={{flex:1,padding:"7px 10px",borderRadius:7,border:"1px solid #c4a070",fontSize:12,background:"#fffdf8",fontFamily:"inherit",resize:"vertical",lineHeight:1.5,color:"#3a2e22"}}
        />
        <button
          onClick={handleAsk}
          disabled={loading||!question.trim()}
          style={{padding:"8px 16px",borderRadius:8,border:"none",background:loading||!question.trim()?"#d4c4a8":"#e8a030",color:"#fff",fontSize:12,fontWeight:700,cursor:loading||!question.trim()?"default":"pointer",whiteSpace:"nowrap",alignSelf:"flex-end"}}
        >{loading?"…":"質問"}</button>
      </div>
      {error && <div style={{fontSize:11,color:"#c04040",marginTop:6}}>{error}</div>}
      {answer && (
        <div style={{marginTop:10,padding:"10px 12px",background:"#fdf5e8",borderRadius:8,border:"1px solid #e8c88044",fontSize:13,lineHeight:1.7,color:"#3a2e22"}}>
          {answer}
        </div>
      )}
    </div>
  );
}

        <div style={{fontSize:12,color:"#5a3a1a",fontWeight:700,marginBottom:6,letterSpacing:1}}>▌ 今の悩み・相談内容</div>
        <textarea
          value={text}
          onChange={e=>setText(e.target.value)}
          placeholder="例：最近心臓がバクバクして不安が続いています。何か改善策はありますか？"
          style={{width:"100%",height:100,padding:"10px 12px",borderRadius:8,border:"1px solid #c4a070",fontSize:13,background:"#fdf5e8",boxSizing:"border-box",resize:"vertical",fontFamily:"inherit",lineHeight:1.7}}
        />
      </div>

      {/* APIキー（未入力時のみ表示） */}
      {!apiKey.trim()&&(
      <div style={{marginBottom:12,padding:"10px 14px",background:"#fff8f0",borderRadius:8,border:"1px solid #e0c090"}}>
        <div style={{fontSize:11,color:"#7a6a55",marginBottom:4}}>⚠️ APIキーを入力してください</div>
        <input type="text" value={apiKey} onChange={e=>{setApiKey(e.target.value);try{localStorage.setItem("shichusuimei_apikey",e.target.value);}catch{}}} placeholder="sk-ant-..."
          style={{width:"100%",padding:"8px 12px",borderRadius:8,border:"1px solid #c4a070",fontSize:12,background:"#fdf5e8",boxSizing:"border-box"}}/>
        <div style={{fontSize:10,color:"#9a8a70",marginTop:4}}>※ 年齢指定運勢タブでAPIキーを入力済みの場合は不要です</div>
      </div>
      )}

      {/* 送信ボタン */}
      <div style={{textAlign:"center",marginBottom:20}}>
        <button onClick={handleSoudan} disabled={!text.trim()||!apiKey.trim()||loading}
          style={{background:(!text.trim()||!apiKey.trim()||loading)?"#ccc":"linear-gradient(135deg,#c88a2a,#e8a030)",border:"none",borderRadius:24,padding:"12px 40px",color:"#fff",fontSize:14,fontWeight:700,cursor:(!text.trim()||!apiKey.trim()||loading)?"not-allowed":"pointer",letterSpacing:2}}>
          {loading?"🔮 鑑定中...":"✦ 四柱推命で相談する ✦"}
        </button>
      </div>

      {error&&<div style={{padding:"10px 14px",background:"#fdf0f0",borderRadius:8,fontSize:12,color:"#904040",marginBottom:12}}>{error}</div>}

      {/* 回答表示 */}
      {answer&&(
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {/* 総括 */}
          <div style={{padding:"14px 16px",background:"linear-gradient(135deg,#fdf5e8,#f5ede0)",border:"1px solid #d4b896",borderRadius:10}}>
            <div style={{fontSize:11,color:"#8a6a3a",fontWeight:700,letterSpacing:1,marginBottom:6}}>◈ 命式から見た状況</div>
            <div style={{fontSize:13,lineHeight:1.9,color:"#4a3828"}}>{answer.summary}</div>
          </div>

          {/* 五行インサイト */}
          <div style={{padding:"14px 16px",background:"#fdf8f2",border:"1px solid #d4b89688",borderRadius:10}}>
            <div style={{fontSize:11,color:"#8a6a3a",fontWeight:700,letterSpacing:1,marginBottom:6}}>◈ 五行バランスから見た原因</div>
            <div style={{fontSize:13,lineHeight:1.9,color:"#4a3828"}}>{answer.gogyou_insight}</div>
          </div>

          {/* 欠け・強すぎアドバイス */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:10}}>
            {answer.missing_advice&&<div style={{padding:"12px 14px",background:"#f0f8ff",border:"1px solid #90c0e088",borderRadius:10}}>
              <div style={{fontSize:11,color:"#3070a0",fontWeight:700,marginBottom:6}}>💧 不足を補うアドバイス</div>
              <div style={{fontSize:12,lineHeight:1.8,color:"#4a3828"}}>{answer.missing_advice}</div>
            </div>}
            {answer.strong_advice&&<div style={{padding:"12px 14px",background:"#fff8f0",border:"1px solid #e0a06088",borderRadius:10}}>
              <div style={{fontSize:11,color:"#a06020",fontWeight:700,marginBottom:6}}>⚡ 強すぎる気を鎮めるアドバイス</div>
              <div style={{fontSize:12,lineHeight:1.8,color:"#4a3828"}}>{answer.strong_advice}</div>
            </div>}
          </div>

              <div style={{fontSize:11,color:"#408040",fontWeight:700,marginBottom:8}}>🥗 おすすめ食材</div>
              {(answer.foods||[]).map((f,i)=><div key={i} style={{fontSize:12,color:"#3a5a3a",padding:"3px 0",borderBottom:"1px solid #c0e0b088",display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:10,color:"#80b080",fontWeight:700}}>{i+1}</span>{f}
              </div>)}
            </div>
            <div style={{padding:"12px 14px",background:"#f0f5ff",border:"1px solid #8090d088",borderRadius:10}}>
              <div style={{fontSize:11,color:"#404080",fontWeight:700,marginBottom:8}}>🗺️ おすすめの場所・方角</div>
              {(answer.places||[]).map((p,i)=><div key={i} style={{fontSize:12,color:"#3a3a5a",padding:"3px 0",borderBottom:"1px solid #c0c0e088",display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:16}}>{["🌊","🌿","⛩️"][i]||"✦"}</span>{p}
              </div>)}
            </div>
            <div style={{padding:"12px 14px",background:"#fdf5ff",border:"1px solid #c090d088",borderRadius:10}}>
              <div style={{fontSize:11,color:"#804090",fontWeight:700,marginBottom:8}}>🎨 おすすめの色・アイテム</div>
              {(answer.colors||[]).map((c,i)=><div key={i} style={{fontSize:12,color:"#5a3a5a",padding:"3px 0",borderBottom:"1px solid #d0b0e088",display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:16}}>{["🔵","🟣","⚪"][i]||"✦"}</span>{c}
              </div>)}
            </div>
          </div>

          {/* 吉方位・ラッキー五行 */}
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            {answer.lucky_element&&<div style={{flex:1,minWidth:120,padding:"10px 14px",borderRadius:10,background:(EC[answer.lucky_element]?.bg)||"#fdf8f2",border:`1px solid ${(EC[answer.lucky_element]?.bd)||"#c4a070"}`,textAlign:"center"}}>
              <div style={{fontSize:10,color:"#8a7a60",marginBottom:4}}>ラッキー五行</div>
              <div style={{fontSize:28,fontWeight:700,color:(EC[answer.lucky_element]?.tx)||"#5a3a1a"}}>{answer.lucky_element}</div>
            </div>}
            {answer.lucky_direction&&<div style={{flex:2,minWidth:180,padding:"10px 14px",borderRadius:10,background:"#fdf5e8",border:"1px solid #d4b896",textAlign:"center"}}>
              <div style={{fontSize:10,color:"#8a7a60",marginBottom:4}}>吉方位</div>
              <div style={{fontSize:16,fontWeight:700,color:"#5a3a1a"}}>{answer.lucky_direction}</div>
            </div>}
          </div>

          {/* 行動アドバイス・注意 */}
          <div style={{padding:"12px 16px",background:"linear-gradient(135deg,#fdf5e8,#fdf8f2)",border:"1px solid #d4b896",borderRadius:10,borderLeft:"4px solid #e8a030"}}>
            <div style={{fontSize:11,color:"#8a6a3a",fontWeight:700,marginBottom:6}}>✦ 今すぐできる行動アドバイス</div>
            <div style={{fontSize:13,lineHeight:1.9,color:"#4a3828",marginBottom:10}}>{answer.action}</div>
            {answer.caution&&<div style={{fontSize:11,color:"#904040",background:"#fdf0f0",borderRadius:6,padding:"6px 10px"}}>⚠️ 注意：{answer.caution}</div>}
          </div>

          {/* 深堀り相談 */}
          <div style={{padding:"14px 16px",background:"#fdf5e8",border:"1px solid #d4b896",borderRadius:10,borderLeft:"4px solid #c4a070"}}>
            <div style={{fontSize:12,color:"#5a3a1a",fontWeight:700,marginBottom:8,letterSpacing:1}}>🔍 さらに深堀りして相談する</div>
            <textarea
              value={followText}
              onChange={e=>setFollowText(e.target.value)}
              placeholder="例：食材についてもっと詳しく教えてください / 仕事面でのアドバイスは？"
              style={{width:"100%",height:70,padding:"8px 12px",borderRadius:8,border:"1px solid #c4a070",fontSize:12,background:"#fffdf8",boxSizing:"border-box",resize:"vertical",fontFamily:"inherit",lineHeight:1.7}}
            />
            <div style={{textAlign:"center",marginTop:8}}>
              <button onClick={async()=>{
                if(!followText.trim()||!apiKey.trim()) return;
                setFollowLoading(true); setFollowError(null); setFollowAnswer(null);
                try {
                  const prompt = `先ほどの四柱推命相談の続きです。

【最初の相談】
${text}

【AIの回答要約】
${answer.summary}
五行インサイト: ${answer.gogyou_insight}
行動アドバイス: ${answer.action}

【追加の質問・深堀り】
${followText}

上記に対して、四柱推命の観点から詳しく丁寧に回答してください。`;
                  const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,messages:[{role:"user",content:prompt}]})});
                  if(!res.ok) throw new Error(`HTTP ${res.status}`);
                  const data = await res.json();
                  setFollowAnswer(data.content?.map(c=>c.text||"").join("")||"");
                } catch(e){ setFollowError(e.message); }
                setFollowLoading(false);
              }} disabled={!followText.trim()||!apiKey.trim()||followLoading}
                style={{background:(!followText.trim()||!apiKey.trim()||followLoading)?"#ccc":"linear-gradient(135deg,#8a6a3a,#c4a070)",border:"none",borderRadius:20,padding:"8px 28px",color:"#fff",fontSize:12,fontWeight:700,cursor:(!followText.trim()||!apiKey.trim()||followLoading)?"not-allowed":"pointer",letterSpacing:1}}>
                {followLoading?"🔍 考え中...":"🔍 深堀りして聞く"}
              </button>
            </div>
            {followError&&<div style={{marginTop:8,padding:"8px 12px",background:"#fdf0f0",borderRadius:6,fontSize:11,color:"#904040"}}>{followError}</div>}
            {followAnswer&&(
              <div style={{marginTop:12,padding:"12px 14px",background:"#fffdf8",border:"1px solid #d4b89688",borderRadius:8,fontSize:13,lineHeight:1.9,color:"#4a3828",whiteSpace:"pre-wrap"}}>{followAnswer}</div>
            )}
          </div>

          {/* 再相談ボタン */}
          <div style={{textAlign:"center"}}>
            <button onClick={()=>{setAnswer(null);setFollowText("");setFollowAnswer(null);}} style={{padding:"8px 20px",borderRadius:8,background:"transparent",border:"1px solid #c4a070",color:"#8a6a3a",cursor:"pointer",fontSize:11}}>🔄 別の相談をする</button>
          </div>
        </div>
      )}
    </div>
  );
}

function AishouSection({mainResult, globalApiKey, setGlobalApiKey, familyChildren, savedKantei}) {
  const [mode, setMode] = useState("input"); // "input" | "family" | "saved"
  const [selChild, setSelChild] = useState(null);
  const [selSaved, setSelSaved] = useState(null);
  const [loadedChildren, setLoadedChildren] = useState([]);
  const [partnerName, setPartnerName] = useState("");
  const [partnerGender, setPartnerGender] = useState("female");
  const [partnerYear, setPartnerYear] = useState("1990");
  const [partnerMonth, setPartnerMonth] = useState("1");
  const [partnerDay, setPartnerDay] = useState("1");
  const [partnerTime, setPartnerTime] = useState("");
  const [partnerResult, setPartnerResult] = useState(null);
  const [aiResult, setAiResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [soudanText, setSoudanText] = useState("");
  const [soudanAnswer, setSoudanAnswer] = useState(null);
  const [soudanLoading, setSoudanLoading] = useState(false);
  const [soudanError, setSoudanError] = useState(null);
  const apiKey = globalApiKey;

  const yearOptions = Array.from({length:101},(_,i)=>new Date().getFullYear()-i);

  // localStorageから家族データを読み込む
  React.useEffect(()=>{
    const key = `shichusuimei_children_${mainResult?.bd}`;
    window.storage.get(key).then(r=>{
      if(r&&r.value){ try{ setLoadedChildren(JSON.parse(r.value)); }catch(e){} }
    }).catch(()=>{});
  },[mainResult?.bd]);

  const allChildren = loadedChildren.length>0 ? loadedChildren : (familyChildren||[]);
  const monthOptions = Array.from({length:12},(_,i)=>i+1);
  const dayOptions = Array.from({length:31},(_,i)=>i+1);

  // 相手の命式を計算
  const calcPartner = () => {
    try {
      if(mode==="family" && selChild!=null) {
        const c = allChildren[selChild];
        const bd = `${c.birthYear}-${String(c.birthMonth||1).padStart(2,"0")}-${String(c.birthDay||1).padStart(2,"0")}`;
        const r = calcAll(c.name||"相手", bd, c.birthTime||"", "male");
        setPartnerResult(r);
      } else if(mode==="saved" && selSaved!=null) {
        const k = savedKantei[selSaved];
        const r = calcAll(k.name||"相手", k.bd, k.time||"", k.gender||"male");
        setPartnerResult(r);
      } else {
        const bd = `${partnerYear}-${String(partnerMonth).padStart(2,"0")}-${String(partnerDay).padStart(2,"0")}`;
        const r = calcAll(partnerName||"相手", bd, partnerTime||"", partnerGender);
        setPartnerResult(r);
      }
      setAiResult(null); setError(null);
    } catch(e) { setError("計算エラー: "+e.message); }
  };

  // 五行相性スコア計算
  const calcAishouScore = (a, b) => {
    if(!a||!b) return null;
    const SG = {木:"火",火:"土",土:"金",金:"水",水:"木"};
    const KO = {木:"土",火:"金",土:"水",金:"木",水:"火"};
    let score = 50;
    const aEl = a.pillars.day.stemEl;
    const bEl = b.pillars.day.stemEl;
    // 日干同士の関係
    if(aEl===bEl) score += 10; // 同じ五行
    else if(SG[aEl]===bEl) score += 20; // aがbを生じる
    else if(SG[bEl]===aEl) score += 20; // bがaを生じる
    else if(KO[aEl]===bEl) score -= 10; // aがbを剋す
    else if(KO[bEl]===aEl) score -= 10; // bがaを剋す
    // 用神が相手の五行と合うか
    if(a.youjin?.youjinEl===bEl) score += 15;
    if(b.youjin?.youjinEl===aEl) score += 15;
    // 干合チェック
    const KANGOKAN2 = {0:{p:5},1:{p:6},2:{p:7},3:{p:8},4:{p:9},5:{p:0},6:{p:1},7:{p:2},8:{p:3},9:{p:4}};
    const aSi = a.pillars.day.stemIdx, bSi = b.pillars.day.stemIdx;
    if(KANGOKAN2[aSi]?.p===bSi) score += 25; // 日干干合！
    // 地支六合
    const ROKUGOU2 = [[0,11],[1,10],[2,9],[3,8],[4,7],[5,6]];
    const aBi = a.pillars.day.branchIdx, bBi = b.pillars.day.branchIdx;
    if(ROKUGOU2.some(([x,y])=>(aBi===x&&bBi===y)||(aBi===y&&bBi===x))) score += 20;
    // 地支相冲
    const SOCHUU2 = [[0,6],[1,7],[2,8],[3,9],[4,10],[5,11]];
    if(SOCHUU2.some(([x,y])=>(aBi===x&&bBi===y)||(aBi===y&&bBi===x))) score -= 15;
    return Math.max(0, Math.min(100, score));
  };

  const getScoreLabel = (s) => {
    if(s>=85) return {label:"最高の相性 ✦✦✦",color:"#e8920a"};
    if(s>=70) return {label:"良い相性 ✦✦",color:"#4a9a4a"};
    if(s>=55) return {label:"普通の相性 ✦",color:"#7a7a3a"};
    if(s>=40) return {label:"注意が必要",color:"#9a6a1a"};
    return {label:"難しい相性",color:"#9a2a2a"};
  };

  const buildPrompt = () => {
    const a = mainResult, b = partnerResult;
    const aEl = a.pillars.day.stemEl, bEl = b.pillars.day.stemEl;
    const score = calcAishouScore(a,b);
    return `あなたは四柱推命の専門家です。以下の2人の命式データをもとに、相性を鑑定してください。

【${a.name}様の命式】
- 日干：${a.pillars.day.stem}（${aEl}）
- 月支：${a.pillars.month.branch}
- 五行バランス：${Object.entries(a.ec).map(([k,v])=>k+":"+v).join("、")}
- 身強・身弱：${a.youjin?.bodyStr||""}
- 用神：${a.youjin?.youjinEl||""}、喜神：${a.youjin?.kijiinEl||""}

【${b.name}様の命式】
- 日干：${b.pillars.day.stem}（${bEl}）
- 月支：${b.pillars.month.branch}
- 五行バランス：${Object.entries(b.ec).map(([k,v])=>k+":"+v).join("、")}
- 身強・身弱：${b.youjin?.bodyStr||""}
- 用神：${b.youjin?.youjinEl||""}、喜神：${b.youjin?.kijiinEl||""}

【五行相性スコア（参考）】${score}点

2人の日干・五行・用神の関係を分析し、相性を鑑定してください。
JSONのみ出力：{
  "overall": "総合評価コメント（150字）",
  "good_points": ["相性の良い点1","相性の良い点2","相性の良い点3"],
  "caution_points": ["注意点1","注意点2"],
  "advice": "2人へのアドバイス（100字）",
  "work": "仕事・協力関係の相性",
  "love": "恋愛・結婚の相性",
  "rating": "◎最高/○良い/△普通/▲注意/✕難しい"
}`;
  };

  const generateAI = async () => {
    if(!apiKey.trim()) { setError("APIキーを入力してください"); return; }
    setLoading(true); setError(null);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,messages:[{role:"user",content:buildPrompt()}]})
      });
      if(!res.ok) throw new Error(`APIエラー HTTP ${res.status}`);
      const data = await res.json();
      if(data.error) throw new Error(data.error.message);
      const text = data.content?.map(c=>c.text||"").join("")||"";
      const m = text.replace(new RegExp(String.fromCharCode(96,96,96)+'json[\\s\\S]*?'+String.fromCharCode(96,96,96),'g'),x=>x.slice(7,-3)).replace(new RegExp(String.fromCharCode(96,96,96),'g'),"").trim().match(/\{[\s\S]*\}/);
      if(!m) throw new Error("JSON取得失敗");
      setAiResult(JSON.parse(m[0]));
    } catch(e){ setError(e.message); }
    setLoading(false);
  };

  const handleSoudan = async () => {
    if(!soudanText.trim()||!apiKey.trim()) return;
    setSoudanLoading(true); setSoudanError(null); setSoudanAnswer(null);
    try {
      const a = mainResult, b = partnerResult;
      const prompt = `あなたは四柱推命の専門家です。以下の2人の命式と相性データをもとに、相談に答えてください。

【${a.name}様】日干：${a.pillars.day.stem}（${a.pillars.day.stemEl}）、用神：${a.youjin?.youjinEl||""}、身強・身弱：${a.youjin?.bodyStr||""}
【${b.name}様】日干：${b.pillars.day.stem}（${b.pillars.day.stemEl}）、用神：${b.youjin?.youjinEl||""}、身強・身弱：${b.youjin?.bodyStr||""}

【相談内容】
${soudanText}

四柱推命の観点から、2人の命式・五行・相性を踏まえて具体的にアドバイスしてください。`;
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,messages:[{role:"user",content:prompt}]})
      });
      if(!res.ok) throw new Error(`APIエラー HTTP ${res.status}`);
      const data = await res.json();
      if(data.error) throw new Error(data.error.message);
      setSoudanAnswer(data.content?.map(c=>c.text||"").join("")||"");
    } catch(e){ setSoudanError(e.message); }
    setSoudanLoading(false);
  };

  const score = calcAishouScore(mainResult, partnerResult);
  const scoreLabel = score!=null ? getScoreLabel(score) : null;
  const RATING_COLOR={"◎最高":"#e8920a","○良い":"#4a9a4a","△普通":"#7a7a3a","▲注意":"#9a6a1a","✕難しい":"#9a2a2a"};

  return (
    <div style={{padding:"16px"}}>
      {/* 相手の選択方法 */}
      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
        <button onClick={()=>{setMode("input");setPartnerResult(null);setAiResult(null);}}
          style={{padding:"7px 18px",borderRadius:8,border:"1px solid #c4a070",background:mode==="input"?"#e8a030":"#fdf5e8",color:mode==="input"?"#fff":"#8a6a3a",fontSize:12,fontWeight:700,cursor:"pointer"}}>
          ✏️ 生年月日を入力
        </button>
        {allChildren&&allChildren.length>0&&(
          <button onClick={()=>{setMode("family");setPartnerResult(null);setAiResult(null);}}
            style={{padding:"7px 18px",borderRadius:8,border:"1px solid #c4a070",background:mode==="family"?"#e8a030":"#fdf5e8",color:mode==="family"?"#fff":"#8a6a3a",fontSize:12,fontWeight:700,cursor:"pointer"}}>
            👨‍👩‍👧‍👦 家族から選ぶ
          </button>
        )}
        {savedKantei&&savedKantei.length>0&&(
          <button onClick={()=>{setMode("saved");setPartnerResult(null);setAiResult(null);setSelSaved(null);}}
            style={{padding:"7px 18px",borderRadius:8,border:"1px solid #c4a070",background:mode==="saved"?"#e8a030":"#fdf5e8",color:mode==="saved"?"#fff":"#8a6a3a",fontSize:12,fontWeight:700,cursor:"pointer"}}>

      {mode==="input" && (

              {/* 仕事・恋愛 */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {aiResult.work&&<div style={{padding:"12px 14px",background:"#f0f5ff",border:"1px solid #8090d088",borderRadius:10}}>

                </div>}
                {aiResult.love&&<div style={{padding:"12px 14px",background:"#fff0f5",border:"1px solid #e080a088",borderRadius:10}}>
                  <div style={{fontSize:11,color:"#804060",fontWeight:700,marginBottom:6}}>💕 恋愛・結婚</div>
                  <div style={{fontSize:12,lineHeight:1.7,color:"#5a3a4a"}}>{aiResult.love}</div>
                </div>}
              </div>
              {/* アドバイス */}
              {aiResult.advice&&<div style={{padding:"12px 16px",background:"#fdf5e8",border:"1px solid #d4b896",borderRadius:10,borderLeft:"4px solid #e8a030"}}>
                <div style={{fontSize:11,color:"#8a6a3a",fontWeight:700,marginBottom:6}}>✦ 2人へのアドバイス</div>
                <div style={{fontSize:13,lineHeight:1.9,color:"#4a3828"}}>{aiResult.advice}</div>
              </div>}
              <div style={{textAlign:"center"}}>
                <button onClick={generateAI} style={{padding:"7px 20px",borderRadius:8,background:"transparent",border:"1px solid #c4a070",color:"#8a6a3a",cursor:"pointer",fontSize:11}}>🔄 再鑑定</button>
              </div>
            </div>
          )}

          {/* 相談セクション */}
          {partnerResult && (
            <div style={{marginTop:20,padding:"14px 16px",background:"#fdf8f2",border:"1px solid #d4b896",borderRadius:10}}>
              <div style={{fontSize:12,fontWeight:700,color:"#5a3a1a",marginBottom:10,letterSpacing:1}}>▌ 2人についての相談</div>
              <textarea
                value={soudanText}
                onChange={e=>setSoudanText(e.target.value)}
                placeholder={`例：${mainResult.name}と${partnerResult?.name||"相手"}の関係で悩んでいます。うまくいくコツを教えてください。`}
                rows={4}
                style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid #c4a070",fontSize:12,lineHeight:1.7,background:"#fffdf8",color:"#4a3828",resize:"vertical",boxSizing:"border-box"}}
              />
              <div style={{textAlign:"center",marginTop:10}}>
                <button onClick={handleSoudan}
                  disabled={!soudanText.trim()||!apiKey.trim()||soudanLoading}
                  style={{background:(!soudanText.trim()||!apiKey.trim()||soudanLoading)?"#ccc":"linear-gradient(135deg,#c88a2a,#e8a030)",border:"none",borderRadius:24,padding:"10px 32px",color:"#fff",fontSize:13,fontWeight:700,cursor:(!soudanText.trim()||!apiKey.trim()||soudanLoading)?"not-allowed":"pointer",letterSpacing:1}}>
                  {soudanLoading?"⏳ 回答中...":"🔮 AIに相談する"}
                </button>
                {!apiKey.trim()&&<div style={{fontSize:10,color:"#9a8a70",marginTop:6}}>※ APIキーを入力すると相談できます</div>}
              </div>
              {soudanError&&<div style={{marginTop:10,padding:"8px 12px",background:"#fdf0f0",borderRadius:8,fontSize:12,color:"#904040"}}>{soudanError}</div>}
              {soudanAnswer&&(
                <div style={{marginTop:14,padding:"14px 16px",background:"linear-gradient(135deg,#fdf5e8,#f5ede0)",border:"1px solid #d4b896",borderRadius:10}}>
                  <div style={{fontSize:11,color:"#8a6a3a",fontWeight:700,marginBottom:8,letterSpacing:1}}>◈ AIからの回答</div>
                  <div style={{fontSize:13,lineHeight:2,color:"#4a3828",whiteSpace:"pre-wrap"}}>{soudanAnswer}</div>
                  <div style={{textAlign:"right",marginTop:10}}>
                    <button onClick={()=>{setSoudanAnswer(null);setSoudanText("");}} style={{padding:"5px 14px",borderRadius:8,background:"transparent",border:"1px solid #c4a070",color:"#8a6a3a",cursor:"pointer",fontSize:11}}>🔄 別の相談をする</button>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function App() {
  // スマートフォン・iPad対応
  React.useEffect(()=>{
    let meta = document.querySelector('meta[name="viewport"]');
    if(!meta){ meta=document.createElement('meta'); meta.name='viewport'; document.head.appendChild(meta); }
    meta.content='width=device-width, initial-scale=1, maximum-scale=1';
    const styleId = 'shichusuimei-safari-fix';

      const style = document.createElement('style');

      document.head.appendChild(style);
    }
  },[]);
  // フォーム状態
  const [formName, setFormName] = useState("Ha");
  const [formGender, setFormGender] = useState("male");
  const [formYear, setFormYear] = useState("1967");
  const [formMonth, setFormMonth] = useState("6");
  const [formDay, setFormDay] = useState("10");
  const [formTime, setFormTime] = useState("06:45");
  const [result, setResult] = useState(null);
  const [submitted, setSubmitted] = useState(false);
  const [globalApiKey, setGlobalApiKey] = useState(()=>{
    try { return localStorage.getItem("shichusuimei_apikey")||""; } catch{ return ""; }
  });
  const [activeTab, setActiveTab] = useState("result"); // "result" | "memo"
  const [savedKantei, setSavedKantei] = useState(()=>{
    try { return JSON.parse(localStorage.getItem("shichusuimei_saved_kantei")||"[]"); } catch{ return []; }
  });
  const [saveMsg, setSaveMsg] = useState(null);
  const [saveGroupInput, setSaveGroupInput] = useState("");
  const [saveMemoInput, setSaveMemoInput] = useState("");
  const [memoPopupId, setMemoPopupId] = useState(null);
  const [memoPopupText, setMemoPopupText] = useState("");
  const [memoPos, setMemoPos] = useState({x: Math.max(0,(window.innerWidth-480)/2), y: Math.max(0,(window.innerHeight-520)/2)});
  const [quickSearch, setQuickSearch] = useState("");
  const [meishikiSearch, setMeishikiSearch] = useState({stem:"",tsuhen:"",junishi:"",text:"",pillar:"",shinsatsu:"",body:"",tsuhenMulti:""});
  const [meishikiSearchResults, setMeishikiSearchResults] = useState(null);
  const [editingId, setEditingId] = useState(null); // 編集中のID
  const [confirmDeleteId, setConfirmDeleteId] = useState(null); // 削除確認中のID
  const [editForm, setEditForm] = useState({}); // 編集フォームの値
  const [familyMgrId, setFamilyMgrId] = useState(null); // 家族管理中のID
  const [savedFamilies, setSavedFamilies] = useState(()=>{
    try { return JSON.parse(localStorage.getItem("shichusuimei_saved_families")||"{}"); } catch{ return {}; }
  });
  const [newFamilyForm, setNewFamilyForm] = useState({name:"",relation:"",gender:"male",birthYear:"1990",birthMonth:"1",birthDay:"1",birthTime:"",memo:""});
  const [editFamilyIdx, setEditFamilyIdx] = useState(null);

  // 起動時データロード（localStorageが空の場合のみ埋め込みデータを使う）
  React.useEffect(()=>{
    if(window.__EMBEDDED__) {
      const e = window.__EMBEDDED__;
      const existingKantei = localStorage.getItem("shichusuimei_saved_kantei");
      if(!existingKantei || existingKantei === "[]") {
        if(e.savedKantei && e.savedKantei.length > 0) {
          setSavedKantei(e.savedKantei);
          try { localStorage.setItem("shichusuimei_saved_kantei", JSON.stringify(e.savedKantei)); } catch{}
        }
      }
      const existingFamilies = localStorage.getItem("shichusuimei_saved_families");
      if(!existingFamilies || existingFamilies === "{}") {
        if(e.savedFamilies) {
          setSavedFamilies(e.savedFamilies);
          try { localStorage.setItem("shichusuimei_saved_families", JSON.stringify(e.savedFamilies)); } catch{}
        }
      }
      if(e.apiKey && !localStorage.getItem("shichusuimei_apikey")) setGlobalApiKey(e.apiKey);
    }
  }, []);
  // APIキーをlocalStorageに自動保存
  React.useEffect(()=>{
    try { localStorage.setItem("shichusuimei_apikey", globalApiKey); } catch{}
  }, [globalApiKey]);
  // メモポップアップ: IDが変わったら既存メモをセット
  React.useEffect(()=>{
    if(memoPopupId){
      const k = savedKantei.find(x=>x.id===memoPopupId);
      setMemoPopupText(k?.memo||"");
      setMemoPos({x: Math.max(0,(window.innerWidth-480)/2), y: Math.max(0,(window.innerHeight-520)/2)});
    }
  }, [memoPopupId]);

  const cy = new Date().getFullYear();

  const saveKantei = () => {
    if(!result) return;
    const entry = {
      id: Date.now(),
      savedAt: new Date().toLocaleDateString("ja-JP"),
      name: result.name,
      bd: result.bd,
      gender: result.gender,
      time: result.time||"",
      dayPillar: result.pillars.day.stem + result.pillars.day.branch,
      group: saveGroupInput.trim()||"未分類",
      memo: saveMemoInput.trim(),
    };
    const next = [entry, ...savedKantei];
    setSavedKantei(next);
    try { localStorage.setItem("shichusuimei_saved_kantei", JSON.stringify(next)); } catch{}
    setSaveMsg("保存しました");
    setSaveMemoInput("");
    setTimeout(()=>setSaveMsg(null), 2000);
  };

  const deleteKantei = (id) => {
    const next = savedKantei.filter(k=>k.id!==id);
    setSavedKantei(next);
    try { localStorage.setItem("shichusuimei_saved_kantei", JSON.stringify(next)); } catch{}
  };

  const startEdit = (k) => {
    setEditingId(k.id);
    setEditForm({
      name: k.name,
      gender: k.gender||"male",
      bd: k.bd,
      time: k.time||"",
      group: k.group||"未分類",
      memo: k.memo||"",
    });
  };

  const saveEdit = () => {
    const next = savedKantei.map(k => {
      if(k.id !== editingId) return k;
      const [y,m,d] = (editForm.bd||k.bd).split("-");
      return {
        ...k,
        name: editForm.name||k.name,
        gender: editForm.gender||k.gender,
        bd: editForm.bd||k.bd,
        time: editForm.time||"",
        group: editForm.group||"未分類",
        memo: editForm.memo||"",
      };
    });
    setSavedKantei(next);
    try { localStorage.setItem("shichusuimei_saved_kantei", JSON.stringify(next)); } catch{}
    setEditingId(null);
    setEditForm({});
  };

  const persistFamilies = (next) => {
    setSavedFamilies(next);
    try { localStorage.setItem("shichusuimei_saved_families", JSON.stringify(next)); } catch{}
  };

  // ── エクスポート ──
  const [showExportJson, setShowExportJson] = useState(false);
  const exportData = () => {
    const data = {
      version: 1,
      exportedAt: new Date().toLocaleString("ja-JP"),
      savedKantei,
      savedFamilies,
    };
    const json = JSON.stringify(data, null, 2);
    // まずダウンロードを試みる
    try {
      const blob = new Blob([json], {type:"application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `shichusuimei_backup_${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url), 1000);
    } catch(e) {}
    // 同時にテキストエリアも表示（iPadフォールバック）
    setShowExportJson(json);
  };

  // ── インポート ──
  const importData = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {

        alert(`インポート完了：${newEntries.length}件追加（重複${mergeKantei.length - newEntries.length}件はスキップ）`);

                                          <button onClick={()=>{setFamilyMgrId(k.id); setEditFamilyIdx(null);}}
                                            style={{padding:"6px 12px",borderRadius:8,background:"transparent",border:"1px solid #7a9a7a",color:"#4a7a4a",fontSize:12,cursor:"pointer"}}>
                                            👨‍👩‍👧 家族
                                          </button>
                                          <button onClick={()=>startEdit(k)}
                                            style={{padding:"6px 12px",borderRadius:8,background:"transparent",border:"1px solid #7a9a7a",color:"#4a7a4a",fontSize:12,cursor:"pointer"}}>
                                            編集
                                          </button>
                                          {confirmDeleteId===k.id ? (
                                            <div style={{display:"flex",gap:4,alignItems:"center"}}>
                                              <span style={{fontSize:11,color:"#904040"}}>削除？</span>
                                              <button onClick={()=>{deleteKantei(k.id);setConfirmDeleteId(null);}}
                                                style={{padding:"5px 10px",borderRadius:6,background:"#c04040",border:"none",color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer"}}>はい</button>
                                              <button onClick={()=>setConfirmDeleteId(null)}
                                                style={{padding:"5px 8px",borderRadius:6,background:"transparent",border:"1px solid #c4a070",color:"#8a6a3a",fontSize:11,cursor:"pointer"}}>いいえ</button>
                                            </div>
                                          ) : (
                                            <button onClick={()=>setConfirmDeleteId(k.id)}
                                              style={{padding:"6px 10px",borderRadius:8,background:"transparent",border:"1px solid #c4a070",color:"#9a6a3a",fontSize:12,cursor:"pointer"}}>
                                              削除
                                            </button>
                                          )}
                                        </div>
                                      </div>
                                    </div>
                                  )}
                                </div>
                              ))}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })()}
              </div>
            )}


          </div>
        )}
      </div>

      {/* ── メモポップアップ ── */}
      {memoPopupId && (()=>{
        const k = savedKantei.find(x=>x.id===memoPopupId);
        if(!k) return null;
        // ポップアップ表示時に現在のメモをセット
        if(memoPopupText==="" && k.memo) {
          // 初期値セットは副作用なのでuseEffectで本来やるべきだが簡易実装
        }
        return (
          <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.15)",zIndex:9999,pointerEvents:"none"}}
            onClick={e=>{if(e.target===e.currentTarget){setMemoPopupId(null);setMemoPopupText("");}}}>
            <div
              style={{position:"fixed",top:memoPos.y,left:memoPos.x,width:480,maxHeight:"80vh",overflow:"auto",background:"#fffdf8",borderRadius:14,padding:"0 28px 24px",boxShadow:"0 8px 32px rgba(0,0,0,0.25)",pointerEvents:"all",userSelect:"none"}}
            >
              <div
                onMouseDown={e=>{
                  if(e.target.tagName==="BUTTON"||e.target.tagName==="TEXTAREA") return;
                  const startX=e.clientX-memoPos.x, startY=e.clientY-memoPos.y;
                  const onMove=ev=>setMemoPos({x:ev.clientX-startX,y:ev.clientY-startY});
                  const onUp=()=>{document.removeEventListener("mousemove",onMove);document.removeEventListener("mouseup",onUp);};
                  document.addEventListener("mousemove",onMove);
                  document.addEventListener("mouseup",onUp);
                }}
                style={{cursor:"move",padding:"16px 0 12px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid #e8d8c0",marginBottom:14}}
              >
                <div>
                  <div style={{fontSize:16,fontWeight:700,color:"#3a2e22"}}>📝 {k.name} さんのメモ <span style={{fontSize:10,color:"#b0a080",fontWeight:400}}>（ドラッグで移動）</span></div>
                  <div style={{fontSize:11,color:"#9a8a70",marginTop:2}}>{k.bd}{k.time&&` ${k.time}`} | {k.gender==="male"?"男性":"女性"} | {k.group||"未分類"}</div>
                </div>
                <button onClick={()=>{setMemoPopupId(null);setMemoPopupText("");}}
                  style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#aaa",padding:"4px 8px"}}>✕</button>
              </div>
              <textarea
                value={memoPopupText}
                onChange={e=>setMemoPopupText(e.target.value)}
                placeholder={"メモを自由に入力してください...\n\n例：\n・初回鑑定：2026/3/14\n・性格的に穏やかで協調性がある\n・健康面：腰痛に注意\n・次回確認事項：大運の切り替わり時期"}
                style={{width:"100%",height:280,padding:"14px 16px",borderRadius:10,border:"1px solid #c4a07088",fontSize:13,background:"#faf5ee",color:"#3a2e22",boxSizing:"border-box",resize:"vertical",lineHeight:1.8,fontFamily:"inherit"}}
              />
              <div style={{display:"flex",gap:10,marginTop:14,justifyContent:"flex-end"}}>
                <button onClick={()=>{setMemoPopupId(null);setMemoPopupText("");}}
                  style={{padding:"8px 20px",borderRadius:8,background:"#e0d8d0",border:"none",color:"#6a5a4a",fontSize:12,cursor:"pointer"}}>キャンセル</button>
                <button onClick={()=>{
                  const next = savedKantei.map(x=>x.id===memoPopupId?{...x,memo:memoPopupText}:x);
                  setSavedKantei(next);
                  try{localStorage.setItem("shichusuimei_saved_kantei",JSON.stringify(next));}catch{}
                  setMemoPopupId(null);setMemoPopupText("");
                }}
                  style={{padding:"8px 24px",borderRadius:8,background:"linear-gradient(135deg,#5a8a5a,#6aaa6a)",border:"none",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>💾 保存</button>
              </div>
            </div>
          </div>
        );
      })()}

      {/* ── 家族管理モーダル ── */}
      {familyMgrId && (()=>{
        const kantei = savedKantei.find(k=>k.id===familyMgrId);
        if(!kantei) return null;
        const members = savedFamilies[familyMgrId] || [];
        const yearOpts = Array.from({length:101},(_,i)=>new Date().getFullYear()-i);
        const monthOpts = Array.from({length:12},(_,i)=>i+1);
        const dayOpts = Array.from({length:31},(_,i)=>i+1);
        const RELATIONS = ["配偶者","父","母","息子","娘","兄","弟","姉","妹","祖父","祖母","孫","友人","知人","その他"];
        return (
          <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.5)",zIndex:1000,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"20px",overflowY:"auto"}}>
            <div style={{background:"#fdf8f2",borderRadius:14,border:"1px solid #c4a070",width:"100%",maxWidth:560,boxShadow:"0 8px 32px rgba(0,0,0,0.2)"}}>
              {/* ヘッダー */}
              <div style={{padding:"14px 18px",borderBottom:"1px solid #e0cba8",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div>
                  <div style={{fontSize:15,fontWeight:700,color:"#3a2e22"}}>👨‍👩‍👧 {kantei.name} の家族</div>
                  <div style={{fontSize:11,color:"#9a8a70",marginTop:2}}>{kantei.bd}　{kantei.gender==="male"?"男性":"女性"}</div>
                </div>
                <button onClick={()=>{setFamilyMgrId(null);setEditFamilyIdx(null);}}
                  style={{background:"transparent",border:"none",fontSize:20,cursor:"pointer",color:"#9a8a70",padding:"4px 8px"}}>✕</button>
              </div>

              <div style={{padding:"16px 18px"}}>
                {/* 登録済み家族一覧 */}
                {members.length===0 ? (
                  <div style={{textAlign:"center",padding:"20px 0",color:"#9a8a70",fontSize:12}}>家族が登録されていません</div>
                ) : (
                  <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
                    {members.map((m,idx)=>(
                      <div key={m.id} style={{background:"#fffdf8",border:"1px solid #e0cba8",borderRadius:10,overflow:"hidden"}}>
                        {editFamilyIdx===idx ? (
                          /* 編集モード */
                          <div style={{padding:"12px 14px"}}>
                            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                              <div>
                                <div style={{fontSize:10,color:"#8a7a60",marginBottom:3}}>名前</div>
                                <input defaultValue={m.name}
                                  onChange={e=>m._edit={...m._edit,name:e.target.value}}
                                  id={`fname_${idx}`}
                                  style={{width:"100%",padding:"5px 8px",borderRadius:6,border:"1px solid #c4a070",fontSize:12,background:"#fffdf8",boxSizing:"border-box"}}/>
                              </div>
                              <div>
                                <div style={{fontSize:10,color:"#8a7a60",marginBottom:3}}>続柄</div>
                                <select defaultValue={m.relation} id={`frel_${idx}`}
                                  style={{width:"100%",padding:"5px 8px",borderRadius:6,border:"1px solid #c4a070",fontSize:12,background:"#fffdf8",boxSizing:"border-box"}}>
                                  {RELATIONS.map(r=><option key={r} value={r}>{r}</option>)}
                                </select>
                              </div>
                              <div>
                                <div style={{fontSize:10,color:"#8a7a60",marginBottom:3}}>性別</div>
                                <div style={{display:"flex",gap:12,paddingTop:4}}>
                                  <label style={{fontSize:12,cursor:"pointer"}}><input type="radio" name={"fgender_"+idx} defaultChecked={m.gender!=="female"} value="male" id={`fgender_male_${idx}`} style={{accentColor:"#e8920a",marginRight:3}}/>男性</label>
                                  <label style={{fontSize:12,cursor:"pointer"}}><input type="radio" name={"fgender_"+idx} defaultChecked={m.gender==="female"} value="female" id={`fgender_female_${idx}`} style={{accentColor:"#e8920a",marginRight:3}}/>女性</label>
                                </div>
                              </div>
                            </div>
                            <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap",alignItems:"center"}}>
                              <span style={{fontSize:10,color:"#8a7a60"}}>生年月日</span>
                              <select defaultValue={m.birthYear} id={`fy_${idx}`} style={{padding:"4px 6px",borderRadius:6,border:"1px solid #c4a070",fontSize:12,background:"#fffdf8"}}>
                                {yearOpts.map(y=><option key={y} value={y}>{y}</option>)}
                              </select>年
                              <select defaultValue={m.birthMonth} id={`fm_${idx}`} style={{padding:"4px 6px",borderRadius:6,border:"1px solid #c4a070",fontSize:12,background:"#fffdf8"}}>
                                {monthOpts.map(mo=><option key={mo} value={mo}>{mo}</option>)}
                              </select>月
                              <select defaultValue={m.birthDay} id={`fd_${idx}`} style={{padding:"4px 6px",borderRadius:6,border:"1px solid #c4a070",fontSize:12,background:"#fffdf8"}}>
                                {dayOpts.map(d=><option key={d} value={d}>{d}</option>)}
                              </select>日
                              <input type="time" defaultValue={m.birthTime||""} id={`ft_${idx}`}
                                style={{padding:"4px 8px",borderRadius:6,border:"1px solid #c4a070",fontSize:12,background:"#fffdf8"}}/>
                            </div>
                            <div style={{marginBottom:8}}>
                              <div style={{fontSize:10,color:"#8a7a60",marginBottom:3}}>メモ</div>
                              <textarea defaultValue={m.memo||""} id={`fmemo_${idx}`} rows={2}
                                style={{width:"100%",padding:"5px 8px",borderRadius:6,border:"1px solid #c4a070",fontSize:12,background:"#fffdf8",resize:"vertical",boxSizing:"border-box"}}/>
                            </div>
                            <div style={{display:"flex",gap:6,justifyContent:"flex-end"}}>
                              <button onClick={()=>setEditFamilyIdx(null)}
                                style={{padding:"5px 12px",borderRadius:8,background:"transparent",border:"1px solid #c4a070",color:"#8a6a3a",fontSize:12,cursor:"pointer"}}>キャンセル</button>
                              <button onClick={()=>updateFamilyMember(familyMgrId, idx, {
                                name: document.getElementById(`fname_${idx}`).value,
                                relation: document.getElementById(`frel_${idx}`).value,
                                gender: document.querySelector(`input[name="fgender_${idx}"]:checked`)?.value||"male",
                                birthYear: document.getElementById(`fy_${idx}`).value,
                                birthMonth: document.getElementById(`fm_${idx}`).value,
                                birthDay: document.getElementById(`fd_${idx}`).value,
                                birthTime: document.getElementById(`ft_${idx}`).value,
                                memo: document.getElementById(`fmemo_${idx}`).value,
                              })}
                                style={{padding:"5px 14px",borderRadius:8,background:"linear-gradient(135deg,#5a8a5a,#6aaa6a)",border:"none",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>保存</button>
                            </div>
                          </div>
                        ) : (
                          /* 通常表示 */
                          <div style={{padding:"10px 14px",display:"flex",alignItems:"flex-start",gap:8}}>
                            <div style={{flex:1}}>
                              <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                                <span style={{fontSize:13,fontWeight:700,color:"#3a2e22"}}>{m.name}</span>
                                {m.relation&&<span style={{fontSize:11,color:"#7a6a55",background:"#f0e8d8",padding:"2px 8px",borderRadius:10}}>{m.relation}</span>}
                                <span style={{fontSize:11,color:"#9a8a70"}}>{m.gender==="female"?"女性":"男性"}</span>
                              </div>
                              <div style={{fontSize:11,color:"#9a8a70",marginTop:2}}>
                                {m.birthYear}/{m.birthMonth}/{m.birthDay}{m.birthTime&&` ${m.birthTime}`}
                              </div>
                              {m.memo&&<div style={{marginTop:4,fontSize:11,color:"#6a5a3a",background:"#f5f0e8",padding:"4px 8px",borderRadius:6,whiteSpace:"pre-wrap"}}>{m.memo}</div>}
                            </div>
                            <div style={{display:"flex",gap:4,flexShrink:0,flexDirection:"column",alignItems:"flex-end"}}>
                              <button onClick={()=>{
                                setFormName(m.name);
                                setFormYear(Number(m.birthYear));
                                setFormMonth(Number(m.birthMonth));
                                setFormDay(Number(m.birthDay));
                                setFormGender(m.gender||"male");
                                setFormTime(m.birthTime||"");
                                setFamilyMgrId(null);
                                setActiveTab("result");
                                window.scrollTo({top:0,behavior:"smooth"});
                              }} style={{padding:"4px 12px",borderRadius:6,background:"linear-gradient(135deg,#c88a2a,#e8a030)",border:"none",color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer"}}>🔮 鑑定</button>
                              <div style={{display:"flex",gap:4}}>
                                <button onClick={()=>setEditFamilyIdx(idx)}
                                  style={{padding:"4px 10px",borderRadius:6,background:"transparent",border:"1px solid #7a9a7a",color:"#4a7a4a",fontSize:11,cursor:"pointer"}}>編集</button>
                                <button onClick={()=>deleteFamilyMember(familyMgrId, idx)}
                                  style={{padding:"4px 8px",borderRadius:6,background:"transparent",border:"1px solid #c4a070",color:"#9a6a3a",fontSize:11,cursor:"pointer"}}>削除</button>
                              </div>
                            </div>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                )}

                {/* 新規追加フォーム */}
                <div style={{padding:"12px 14px",background:"#f5f0e8",border:"1px solid #d4b896",borderRadius:10}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#5a3a1a",marginBottom:10,letterSpacing:1}}>▌ 家族を追加</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                    <div>
                      <div style={{fontSize:10,color:"#8a7a60",marginBottom:3}}>名前 *</div>
                      <input value={newFamilyForm.name} onChange={e=>setNewFamilyForm({...newFamilyForm,name:e.target.value})}
                        placeholder="名前"
                        style={{width:"100%",padding:"5px 8px",borderRadius:6,border:"1px solid #c4a070",fontSize:12,background:"#fffdf8",boxSizing:"border-box"}}/>
                    </div>
                    <div>
                      <div style={{fontSize:10,color:"#8a7a60",marginBottom:3}}>続柄</div>
                      <select value={newFamilyForm.relation} onChange={e=>setNewFamilyForm({...newFamilyForm,relation:e.target.value})}
                        style={{width:"100%",padding:"5px 8px",borderRadius:6,border:"1px solid #c4a070",fontSize:12,background:"#fffdf8",boxSizing:"border-box"}}>
                        <option value="">選択...</option>
                        {RELATIONS.map(r=><option key={r} value={r}>{r}</option>)}
                      </select>
                    </div>
                    <div>
                      <div style={{fontSize:10,color:"#8a7a60",marginBottom:3}}>性別</div>
                      <div style={{display:"flex",gap:12,paddingTop:4}}>
                        <label style={{fontSize:12,cursor:"pointer"}}><input type="radio" checked={newFamilyForm.gender!=="female"} onChange={()=>setNewFamilyForm({...newFamilyForm,gender:"male"})} style={{accentColor:"#e8920a",marginRight:3}}/>男性</label>
                        <label style={{fontSize:12,cursor:"pointer"}}><input type="radio" checked={newFamilyForm.gender==="female"} onChange={()=>setNewFamilyForm({...newFamilyForm,gender:"female"})} style={{accentColor:"#e8920a",marginRight:3}}/>女性</label>
                      </div>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap",alignItems:"center"}}>
                    <span style={{fontSize:10,color:"#8a7a60"}}>生年月日</span>
                    <select value={newFamilyForm.birthYear} onChange={e=>setNewFamilyForm({...newFamilyForm,birthYear:e.target.value})}
                      style={{padding:"4px 6px",borderRadius:6,border:"1px solid #c4a070",fontSize:12,background:"#fffdf8"}}>
                      {yearOpts.map(y=><option key={y} value={y}>{y}</option>)}
                    </select>年
                    <select value={newFamilyForm.birthMonth} onChange={e=>setNewFamilyForm({...newFamilyForm,birthMonth:e.target.value})}
                      style={{padding:"4px 6px",borderRadius:6,border:"1px solid #c4a070",fontSize:12,background:"#fffdf8"}}>
                      {monthOpts.map(mo=><option key={mo} value={mo}>{mo}</option>)}
                    </select>月
                    <select value={newFamilyForm.birthDay} onChange={e=>setNewFamilyForm({...newFamilyForm,birthDay:e.target.value})}
                      style={{padding:"4px 6px",borderRadius:6,border:"1px solid #c4a070",fontSize:12,background:"#fffdf8"}}>
                      {dayOpts.map(d=><option key={d} value={d}>{d}</option>)}
                    </select>日
                    <input type="time" value={newFamilyForm.birthTime} onChange={e=>setNewFamilyForm({...newFamilyForm,birthTime:e.target.value})}
                      style={{padding:"4px 8px",borderRadius:6,border:"1px solid #c4a070",fontSize:12,background:"#fffdf8"}}/>
                  </div>
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:10,color:"#8a7a60",marginBottom:3}}>メモ</div>
                    <textarea value={newFamilyForm.memo} onChange={e=>setNewFamilyForm({...newFamilyForm,memo:e.target.value})}
                      rows={2} placeholder="メモ（任意）"
                      style={{width:"100%",padding:"5px 8px",borderRadius:6,border:"1px solid #c4a070",fontSize:12,background:"#fffdf8",resize:"vertical",boxSizing:"border-box"}}/>
                  </div>
                  <div style={{textAlign:"center"}}>
                    <button onClick={()=>addFamilyMember(familyMgrId)}
                      disabled={!newFamilyForm.name.trim()}
                      style={{background:newFamilyForm.name.trim()?"linear-gradient(135deg,#c88a2a,#e8a030)":"#ccc",border:"none",borderRadius:20,padding:"8px 28px",color:"#fff",fontSize:13,fontWeight:700,cursor:newFamilyForm.name.trim()?"pointer":"not-allowed"}}>
                      ＋ 追加
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}




const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
